<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>RefLink counter</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: transparent;
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }
  * { box-sizing: border-box; }

  .wrap {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 11px;
    background: #000;
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 999px;
    box-shadow:
      0 6px 20px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
    opacity: 0;
    transform: translateX(-60px) scale(0.94);
    transition:
      opacity 0.40s ease,
      transform 0.46s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .pill.visible {
    opacity: 1;
    transform: translateX(0) scale(1);
  }

  .group {
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
  }
  .group svg {
    width: 14px;
    height: 14px;
    color: #e6e6e8;
    flex-shrink: 0;
  }
  .count {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 12.5px;
    color: #f4f4f6;
    min-width: 7px;
    text-align: left;
    letter-spacing: -0.1px;
    transition: color 0.3s ease;
  }
  .count.bump { color: #8fe6b5; }

  .divider {
    width: 1px;
    height: 14px;
    background: rgba(255, 255, 255, 0.12);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="pill" id="pill">
      <div class="group">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span class="count" id="count-text">0</span>
      </div>
      <div class="divider"></div>
      <div class="group">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2.5" ry="2.5"/>
          <circle cx="8.5" cy="8.5" r="1.6"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span class="count" id="count-img">0</span>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const pill = document.getElementById('pill');
    const countText = document.getElementById('count-text');
    const countImg = document.getElementById('count-img');

    let lastText = 0;
    let lastImg = 0;

    function bump(el) {
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 360);
    }

    ipcRenderer.on('counter:update', (_e, { texts, imgs, visible }) => {
      if (texts !== lastText) {
        countText.textContent = String(texts);
        if (texts > lastText) bump(countText);
        lastText = texts;
      }
      if (imgs !== lastImg) {
        countImg.textContent = String(imgs);
        if (imgs > lastImg) bump(countImg);
        lastImg = imgs;
      }
      if (visible) {
        // Double rAF ensures the browser commits a paint at the hidden state
        // before adding .visible — without this, showing the window and
        // adding the class in the same frame can skip the transition.
        requestAnimationFrame(() => requestAnimationFrame(() => {
          pill.classList.add('visible');
        }));
      } else {
        pill.classList.remove('visible');
      }
    });
  </script>
</body>
</html>
