<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Trigger Phrases</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1e1e1e;
      color: #eee;
      user-select: none;
      -webkit-user-select: none;
    }
    h1 { margin: 0 0 4px; font-size: 14px; font-weight: 600; }
    .subtitle { color: #888; font-size: 11px; margin-bottom: 16px; line-height: 1.4; }
    .list {
      max-height: 260px;
      overflow-y: auto;
      margin-bottom: 12px;
      padding: 4px;
      background: #161616;
      border-radius: 6px;
      min-height: 60px;
    }
    .empty { color: #555; font-size: 12px; text-align: center; padding: 20px; }
    .row {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      margin-bottom: 4px;
      background: #2a2a2a;
      border-radius: 4px;
      font-size: 13px;
    }
    .row:last-child { margin-bottom: 0; }
    .row .phrase { flex: 1; -webkit-user-select: text; user-select: text; }
    .row .remove {
      background: transparent;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 6px;
    }
    .row .remove:hover { color: #f55; }
    .add-row { display: flex; gap: 8px; }
    .add-row input {
      flex: 1;
      padding: 6px 10px;
      font-size: 13px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #eee;
      border-radius: 4px;
      outline: none;
    }
    .add-row input:focus { border-color: #5a5a5a; }
    .add-row button {
      padding: 6px 14px;
      font-size: 13px;
      background: #3a3a3a;
      border: none;
      color: #eee;
      border-radius: 4px;
      cursor: pointer;
    }
    .add-row button:hover { background: #4a4a4a; }
    .hint { margin-top: 10px; font-size: 10px; color: #555; }
  </style>
</head>
<body>
  <h1>Trigger Phrases</h1>
  <div class="subtitle">Speak any of these during a Wispr session to insert the next queued ref. Not case-sensitive. Changes save immediately.</div>
  <div class="list" id="list"></div>
  <form class="add-row" id="addForm">
    <input type="text" id="input" placeholder="e.g. insert image" autocomplete="off" spellcheck="false" />
    <button type="submit">Add</button>
  </form>
  <div class="hint">Esc to close. Reset to defaults via Settings menu.</div>
  <script>
    const { ipcRenderer } = require('electron');
    let triggers = [];

    const listEl = document.getElementById('list');
    const inputEl = document.getElementById('input');
    const formEl = document.getElementById('addForm');

    function render() {
      listEl.innerHTML = '';
      if (!triggers.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'No triggers — RefLink will stay silent until you add one.';
        listEl.appendChild(empty);
        return;
      }
      triggers.forEach((phrase, i) => {
        const row = document.createElement('div');
        row.className = 'row';
        const span = document.createElement('span');
        span.className = 'phrase';
        span.textContent = phrase;
        const btn = document.createElement('button');
        btn.className = 'remove';
        btn.textContent = '×';
        btn.title = 'Remove';
        btn.type = 'button';
        btn.addEventListener('click', () => remove(i));
        row.appendChild(span);
        row.appendChild(btn);
        listEl.appendChild(row);
      });
    }

    function add(raw) {
      const phrase = (raw || '').trim().toLowerCase().replace(/\s+/g, ' ');
      if (!phrase) return;
      if (triggers.includes(phrase)) return;
      triggers = [...triggers, phrase];
      ipcRenderer.send('triggers:update', triggers);
      render();
    }

    function remove(i) {
      triggers = triggers.filter((_, idx) => idx !== i);
      ipcRenderer.send('triggers:update', triggers);
      render();
    }

    formEl.addEventListener('submit', (e) => {
      e.preventDefault();
      add(inputEl.value);
      inputEl.value = '';
      inputEl.focus();
    });

    ipcRenderer.on('triggers:init', (_e, list) => {
      triggers = Array.isArray(list) ? [...list] : [];
      render();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') window.close();
    });

    inputEl.focus();
  </script>
</body>
</html>
